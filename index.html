<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สั่งอาหาร & เรียกพนักงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-bell bell-shake"></i> Smart Service</h1>
        <p>ยินดีต้อนรับสู่ร้านของเรา</p>
    </div>

    <div class="container">
        <div class="card customer-section" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header">
                <h2><i class="fa-solid fa-qrcode"></i> บริการลูกค้า</h2>
            </div>
            <div class="input-group">
                <label for="tableNumber"><i class="fa-solid fa-utensils"></i> ระบุหมายเลขโต๊ะของคุณ</label>
                <input type="number" id="tableNumber" placeholder="เช่น 5" value="1">
            </div>
            
            <div class="button-group">
                <button class="btn btn-call" onclick="sendRequest('เรียกพนักงาน')">
                    <i class="fa-solid fa-hand-sparkles"></i> เรียกพนักงาน
                </button>
                <button class="btn btn-menu" onclick="sendRequest('ขอเมนู')">
                    <i class="fa-solid fa-book-open"></i> ดูเมนูอาหาร
                </button>
                <button class="btn btn-bill" onclick="sendRequest('เก็บเงิน')">
                    <i class="fa-solid fa-file-invoice-dollar"></i> เก็บเงิน
                </button>
            </div>
        </div>
    </div>

    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMenu()">×</span>
            <h2>เมนูอาหารของเรา</h2>
            <div id="menuContainer" class="menu-container"></div>
        </div>
    </div>

    <script type="module" src="customer.js"></script>
</body>
</html>
